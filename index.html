<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصمم قوالب موسوعة البصرة الاخبارية الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- استيراد خطوط عربية إضافية -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&family=Changa:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h2 {
            margin-bottom: 20px;
            color: #38bdf8;
            font-size: 20px;
            text-align: center;
        }

        /* حاوية المعاينة الإخبارية المطابقة للأبعاد الإخبارية القياسية */
        .preview-container {
            width: 420px;
            height: 580px;
            background-color: #f8fafc;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* منطقة عرض الصورة - تم زيادة مساحتها لتصبح 86% */
        .image-area {
            width: 100%;
            height: 86%; 
            background-color: #f8fafc; 
            background-repeat: no-repeat;
            background-size: cover; 
            background-position: center;
            position: relative;
            box-sizing: border-box;
        }

        /* هيدر علوي شفاف يطفو فوق الصورة مباشرة */
        .top-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            z-index: 3;
            background: linear-gradient(rgba(0,0,0,0.4), transparent);
        }

        /* تصغير الشعار ووضعه بشكل ناعم أعلى اليمين */
        .logo-img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            background-color: #ffffff;
        }

        /* التاريخ يطفو بوضوح فوق الصورة في اليسار */
        .date-text {
            font-size: 13px;
            font-weight: bold;
            color: #38bdf8;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9), -1px -1px 4px rgba(0,0,0,0.9);
        }

        /* منطقة الخبر السفلي - تم تقليص حجمها لتصبح 14% */
        .bottom-content-area {
            width: 100%;
            height: 14%; 
            background: linear-gradient(135deg, #1e40af 0%, #0369a1 100%);
            border-top: 2.5px solid #38bdf8; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px 12px 5px 12px;
            box-sizing: border-box;
            z-index: 2;
        }

        /* حاوية النص بداخل شريط العنوان */
        .text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
            padding: 0 4px;
        }

        .title-text {
            font-size: 13px; 
            font-weight: bold;
            color: #ffffff;
            margin: 0;
            line-height: 1.3;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            /* الخط الافتراضي للنص داخل القالب */
            font-family: 'Cairo', sans-serif;
        }

        /* شريط الحسابات السفلي */
        .social-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: #ffffff;
            font-weight: 500;
        }

        .social-item {
            display: flex;
            align-items: center;
        }
        
        .fa-whatsapp { color: #25d366; font-size: 11px; }
        .fa-telegram { color: #24a1de; font-size: 11px; }

        /* لوحة التحكم السفلى */
        .control-panel {
            width: 420px;
            background-color: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
            margin-top: 12px;
        }

        .section-title:first-child { margin-top: 0; }

        .input-custom, .select-custom {
            width: 100%;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 13px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #0f172a;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .slider-container input { flex: 1; cursor: pointer; }
        .slider-val { font-size: 12px; color: #94a3b8; min-width: 40px; text-align: center; }

        textarea {
            width: 100%;
            height: 65px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .btn-download {
            background-color: #38bdf8; 
            color: #0f172a;
            width: 100%;
            font-size: 14px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-download:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h2>محرر قوالب موسوعة البصرة الاخبارية</h2>

    <!-- شاشة المعاينة الحية -->
    <div class="preview-container" id="capture-area">
        
        <!-- منطقة عرض الصورة الممتدة -->
        <div class="image-area" id="bg-image-layer">
            <div class="top-overlay">
                <!-- الشعار مصغر وناعم في اليمين فوق الصورة -->
                <img src="Logo.jpg" alt="شعار موسوعة البصرة" class="logo-img" onerror="this.style.display='none';">
                <!-- التاريخ في اليسار فوق الصورة -->
                <div class="date-text" id="display-date"></div>
            </div>
        </div>
        
        <!-- منطقة النص السفلية المصغرة -->
        <div class="bottom-content-area">
            <div class="text-container">
                <p class="title-text" id="display-title">أدخل عنوان الخبر الإخباري هنا ليظهر متناسقاً داخل شريط التدرج الأزرق...</p>
            </div>
            
            <!-- شريط الحسابات والموقع -->
            <div class="social-footer">
                <div class="social-item"><i class="fab fa-whatsapp"></i></div>
                <div class="social-item"><i class="fab fa-telegram"></i></div>
                <span>moswot_albasra</span>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم السفلى -->
    <div class="control-panel">
        
        <div class="section-title">إدراج صورة الخبر أو الكتاب الرسمي</div>
        <input type="file" id="image-loader" class="input-custom" accept="image/*" onchange="loadImage(event)">

        <div class="section-title">طريقة احتواء الصورة داخل الإطار</div>
        <select id="image-fit-select" class="select-custom" onchange="changeImageFit()">
            <option value="cover">ملء الإطار بالكامل (يمنع الفراغ الأبيض الجانبي)</option>
            <option value="contain">إظهار الصورة كاملة بشكل طولي</option>
        </select>

        <div class="section-title">اختيار نوع خط العناوين</div>
        <select id="font-family-select" class="select-custom" onchange="changeFontFamily()">
            <option value="'Cairo', sans-serif">خط كايرو (Cairo)</option>
            <option value="'Tajawal', sans-serif">خط تجوال (Tajawal)</option>
            <option value="'Amiri', serif">خط أميري (Amiri - رسمي كلاسيكي)</option>
            <option value="'Changa', sans-serif">خط شانغا (Changa - عريض قوي)</option>
        </select>

        <div class="section-title">تحجيم زوم الصورة الخلفية</div>
        <div class="slider-container">
            <input type="range" id="image-size-slider" min="50" max="200" value="100" oninput="changeImageSize()">
            <span id="image-size-val" class="slider-val">100%</span>
        </div>

        <div class="section-title">حجم خط الخبر السفلي</div>
        <div class="slider-container">
            <input type="range" id="font-size-slider" min="11" max="18" value="13" oninput="changeFontSize()">
            <span id="font-size-val" class="slider-val">13px</span>
        </div>

        <div class="section-title">محتوى العنوان</div>
        <textarea id="input-title" placeholder="اكتب نص العنوان هنا..." oninput="updateTitle()"></textarea>

        <button class="btn-download" onclick="downloadImage()">تصدير التصميم كصورة للنشر</button>
    </div>

    <script>
        function setTodayDate() {
            const today = new Date();
            const day = today.getDate();
            const month = today.getMonth() + 1;
            const year = today.getFullYear();
            document.getElementById('display-date').innerText = `${day}-${month}-${year}`;
        }
        
        window.onload = setTodayDate;

        function loadImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const imageLayer = document.getElementById('bg-image-layer');
                imageLayer.style.backgroundImage = `url(${reader.result})`;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function changeImageFit() {
            const fitValue = document.getElementById('image-fit-select').value;
            const imageLayer = document.getElementById('bg-image-layer');
            imageLayer.style.backgroundSize = fitValue;
            document.getElementById('image-size-slider').value = 100;
            document.getElementById('image-size-val').innerText = '100%';
        }

        function changeImageSize() {
            const sliderValue = document.getElementById('image-size-slider').value;
            const imageLayer = document.getElementById('bg-image-layer');
            const sizeLabel = document.getElementById('image-size-val');
            imageLayer.style.backgroundSize = sliderValue + '%';
            sizeLabel.innerText = sliderValue + '%';
        }

        function changeFontFamily() {
            const fontValue = document.getElementById('font-family-select').value;
            const displayTitle = document.getElementById('display-title');
            displayTitle.style.fontFamily = fontValue;
        }

        function updateTitle() {
            const titleInput = document.getElementById('input-title').value;
            const displayTitle = document.getElementById('display-title');
            if(titleInput.trim() === "") {
                displayTitle.innerText = "أدخل عنوان الخبر الإخباري هنا ليظهر متناسقاً داخل شريط التدرج الأزرق...";
            } else {
                displayTitle.innerText = titleInput;
            }
        }

        function changeFontSize() {
            const sliderValue = document.getElementById('font-size-slider').value;
            const displayTitle = document.getElementById('display-title');
            const sizeLabel = document.getElementById('font-size-val');
            displayTitle.style.fontSize = sliderValue + 'px';
            sizeLabel.innerText = sliderValue + 'px';
        }

        function downloadImage() {
            const captureArea = document.getElementById('capture-area');
            const options = {
                scale: 2, 
                useCORS: true, 
                backgroundColor: null
            };

            html2canvas(captureArea, options).then(canvas => {
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `basra_news_post_${Date.now()}.png`;
                link.href = image;
                link.click();
            });
        }
    </script>

</body>
</html>
