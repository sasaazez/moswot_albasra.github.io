<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر أخبار دارك</title>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        #canvas { width: 350px; height: 450px; background: white; border: 2px solid #ccc; position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logo { width: 50px; height: 50px; background: #003366; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .date { font-size: 14px; color: #555; }
        .footer { background: #0055aa; color: white; padding: 15px; border-radius: 10px; text-align: center; font-size: 16px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
    </style>
</head>
<body>
    <h3>صانع قوالب إذاعة دارك</h3>
    <div id="canvas">
        <div class="header">
            <div class="logo">دارك</div>
            <div class="date" id="displayDate"></div>
        </div>
        <div class="content" id="newsText">اكتب عنوان الخبر هنا...</div>
        <div class="footer">إذاعة دارك - البصرة</div>
    </div>
    <textarea oninput="document.getElementById('newsText').innerText = this.value" placeholder="اكتب الخبر هنا"></textarea>
    <script>
        document.getElementById('displayDate').innerText = new Date().toLocaleDateString('ar-EG');
    </script>
</body>
</html>
