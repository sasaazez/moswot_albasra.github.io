<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مصمم قوالب موسوعة البصرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .preview-container { width: 420px; height: 580px; background-color: #f8fafc; border-radius: 4px; position: relative; box-shadow: 0 12px 35px rgba(0,0,0,0.6); overflow: hidden; display: flex; flex-direction: column; }
        .image-area { width: 100%; height: 78%; background-size: cover; background-position: center; position: relative; }
        .bottom-content-area { width: 100%; height: 22%; background: linear-gradient(135deg, #1e40af 0%, #0369a1 100%); display: flex; flex-direction: column; justify-content: center; padding: 15px; box-sizing: border-box; }
        .title-text { font-size: 14px; font-weight: bold; color: #ffffff; text-align: center; margin: 0; line-height: 1.6; }
        .control-panel { width: 420px; background-color: #1e293b; padding: 20px; margin-top: 20px; border-radius: 16px; }
    </style>
</head>
<body>

    <div class="preview-container" id="capture-area">
        <div class="image-area" id="bg-image-layer"></div>
        <div class="bottom-content-area" id="main-area">
            <p class="title-text" id="display-title">أدخل النص هنا...</p>
        </div>
    </div>

    <div class="control-panel">
        <label><input type="checkbox" id="mode-switch" onchange="toggleMode()"> وضع النص الطويل (بدون صورة)</label>
        <div style="margin-top:15px">محتوى النص:</div>
        <textarea id="input-title" style="width:100%; height:100px; margin-top:5px;" oninput="updateTitle()"></textarea>
        <button onclick="downloadImage()" style="width:100%; padding:10px; margin-top:10px; background:#38bdf8; border:none; border-radius:5px; cursor:pointer;">تصدير التصميم</button>
    </div>

    <script>
        function toggleMode() {
            const isChecked = document.getElementById('mode-switch').checked;
            const imgArea = document.getElementById('bg-image-layer');
            const mainArea = document.getElementById('main-area');
            
            if (isChecked) {
                imgArea.style.display = 'none';
                mainArea.style.height = '100%';
            } else {
                imgArea.style.display = 'block';
                mainArea.style.height = '22%';
            }
        }
        function updateTitle() { document.getElementById('display-title').innerText = document.getElementById('input-title').value; }
        function downloadImage() {
            html2canvas(document.getElementById('capture-area')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'post.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
