<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصمم قوالب موسوعة البصرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- استيراد خطوط عربية عريضة وواضحة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h2 {
            margin-bottom: 20px;
            color: #38bdf8;
        }

        /* حاوية المعاينة الأساسية */
        .preview-container {
            width: 420px;
            height: 580px;
            background-color: #0f172a;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* إطار عرض الصورة أو الكتاب الرسمي */
        .image-area {
            position: absolute;
            width: 86%;
            height: 52%;
            top: 14%;
            left: 7%;
            right: 7%;
            background-color: #ffffff; 
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 1;
            transition: all 0.3s ease;
        }

        /* لوكو موسوعة البصرة في الأعلى (دائري وواضح) */
        .top-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 5;
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 2px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
        }

        .top-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* التاريخ في الأعلى اليسار */
        .date-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 5;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 900;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
            letter-spacing: 0.5px;
        }

        /* شريط العنوان الرئيسي بخط واضح جداً وعريض */
        .title-box-container {
            position: absolute;
            bottom: 45px;
            left: 12px;
            right: 12px;
            padding: 14px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 2px solid rgba(239, 68, 68, 0.9);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }

        .title-text {
            font-family: 'Tajawal', sans-serif; 
            font-size: 16px; 
            font-weight: 900; /* سماكة عالية للوضوح */
            color: #ffffff;
            margin: 0;
            line-height: 1.4;
            width: 100%;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* شريط الحسابات السفلي */
        .social-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 38px;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            z-index: 5;
            background: rgba(0, 0, 0, 0.92);
            border-top: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        .brand-handle {
            color: #ffffff;
            letter-spacing: 0.5px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
        }

        .social-icons-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .social-item i {
            color: #ffffff !important;
            font-size: 13px;
        }

        /* لوحة التحكم السفلى */
        .control-panel {
            width: 420px;
            background-color: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        .section-title:first-child { margin-top: 0; }

        textarea {
            width: 100%;
            height: 80px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            padding: 12px;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .type-btn {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #ffffff;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #0f172a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .slider-container input { flex: 1; cursor: pointer; }
        .slider-val { font-size: 13px; color: #94a3b8; min-width: 45px; text-align: center; }

        .btn-download {
            background-color: #22c55e; 
            color: #ffffff;
            width: 100%;
            font-size: 14px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>محرر قوالب موسوعة البصرة</h2>

    <!-- شاشة المعاينة الحية -->
    <div class="preview-container" id="capture-area">
        
        <!-- إطار الصورة أو الكتاب الرسمي -->
        <div class="image-area" id="bg-image-layer"></div>

        <!-- شعار موسوعة البصرة -->
        <div class="top-overlay">
            <img src="" id="logo-display-img" alt="Logo" style="display:none;">
            <span id="logo-placeholder-text" style="font-size: 10px; color: #000; font-weight: bold;">الشعار</span>
        </div>

        <!-- التاريخ -->
        <div class="date-top-left" id="display-date">21-7-2026</div>
        
        <!-- شريط العنوان بخط عريض وواضح -->
        <div class="title-box-container">
            <p class="title-text" id="display-title">وافق مجلس الوزراء على أن تنقل بلدية البصرة ملكية الوحدات السكنية في (مجمع الرحاب السكني) إلى المستفيدين، وفي حال وجود بدل بيع يجب دفعه من قبل المستثمر.</p>
        </div>

        <!-- شريط الحسابات السفلي -->
        <div class="social-footer">
            <div class="social-icons-group">
                <div class="social-item"><i class="fab fa-facebook-f"></i></div>
                <div class="social-item"><i class="fab fa-instagram"></i></div>
                <div class="social-item"><i class="fab fa-tiktok"></i></div>
                <div class="social-item"><i class="fab fa-telegram-plane"></i></div>
            </div>
            <span class="brand-handle">mawsuatalbasra</span>
        </div>
    </div>

    <!-- لوحة التحكم السفلى -->
    <div class="control-panel">

        <div class="section-title">محتوى الخبر</div>
        <textarea id="input-title" placeholder="اكتب نص الخبر هنا..." oninput="updateTitle()">وافق مجلس الوزراء على أن تنقل بلدية البصرة ملكية الوحدات السكنية في (مجمع الرحاب السكني) إلى المستفيدين، وفي حال وجود بدل بيع يجب دفعه من قبل المستثمر.</textarea>

        <div class="section-title">حجم خط العنوان</div>
        <div class="slider-container">
            <input type="range" id="font-size-slider" min="14" max="26" value="16" oninput="changeFontSize()">
            <span id="font-size-val" class="slider-val">16px</span>
        </div>

        <div class="section-title">إعدادات الخلفية والشعار</div>
        <div class="btn-row">
            <input type="file" id="image-loader" accept="image/*" style="display:none;" onchange="loadImage(event)">
            <button class="type-btn" style="flex:1;" onclick="document.getElementById('image-loader').click()">اختر صورة الخبر</button>
            
            <input type="file" id="logo-loader" accept="image/*" style="display:none;" onchange="loadLogo(event)">
            <button class="type-btn" style="flex:1;" onclick="document.getElementById('logo-loader').click()">اختر الشعار</button>
        </div>

        <button class="btn-download" onclick="downloadImage()"><i class="fa-solid fa-download"></i> حفظ التصميم النهائي</button>
    </div>

    <script>
        function loadImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const imageLayer = document.getElementById('bg-image-layer');
                imageLayer.style.backgroundImage = `url(${reader.result})`;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function loadLogo(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const logoImg = document.getElementById('logo-display-img');
                const placeholder = document.getElementById('logo-placeholder-text');
                logoImg.src = reader.result;
                logoImg.style.display = 'block';
                placeholder.style.display = 'none';
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function updateTitle() {
            const titleInput = document.getElementById('input-title').value;
            const displayTitle = document.getElementById('display-title');
            displayTitle.innerText = titleInput.trim() === "" ? "اكتب تفاصيل الخبر هنا..." : titleInput;
        }

        function changeFontSize() {
            const val = document.getElementById('font-size-slider').value;
            document.getElementById('display-title').style.fontSize = val + 'px';
            document.getElementById('font-size-val').innerText = val + 'px';
        }

        function downloadImage() {
            const captureArea = document.getElementById('capture-area');
            html2canvas(captureArea, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = `mawsuat_albasra_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
