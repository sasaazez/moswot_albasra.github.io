<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصمم قوالب موسوعة البصرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .preview-container { width: 350px; height: 480px; background-color: #f8fafc; border-radius: 4px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .image-area { width: 100%; height: 75%; background-color: #ddd; background-size: cover; background-position: center; position: relative; }
        .top-overlay { position: absolute; top: 10px; left: 10px; z-index: 3; }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; }
        .bottom-content-area { width: 100%; height: 25%; background: linear-gradient(135deg, #1e40af, #0369a1); padding: 10px; color: white; text-align: center; }
        textarea { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="preview-container" id="capture-area">
        <div class="image-area" id="bg-image-layer">
            <div class="top-overlay">
                <img src="logo.jpg" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            </div>
        </div>
        <div class="bottom-content-area">
            <p id="display-title">موسوعة البصرة الإخبارية</p>
        </div>
    </div>
    <input type="file" onchange="const r=new FileReader(); r.onload=e=>document.getElementById('bg-image-layer').style.backgroundImage='url('+e.target.result+')'; r.readAsDataURL(this.files[0])">
    <textarea oninput="document.getElementById('display-title').innerText=this.value"></textarea>
</body>
</html>
